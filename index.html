<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>빅5 병원 통합 예약 에이전트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F3F5F9;--card:#fff;--ink:#0F172A;--ink2:#475569;--ink3:#94A3B8;--border:#E2E8F0;--accent:#2563EB;--accent2:#3B82F6;--success:#059669;--warn:#D97706;--danger:#DC2626;--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}button{cursor:pointer;border:none;outline:none}input,textarea{outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.header{background:var(--ink);color:#fff;padding:18px 24px;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto}
.header-tag{font-size:10px;font-weight:700;color:#60A5FA;letter-spacing:2.5px;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.header-title{font-size:20px;font-weight:900}.header-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.container{max-width:720px;margin:0 auto;padding:28px 20px 80px}
.steps{display:flex;align-items:center;margin-bottom:32px;padding:0 4px}
.step-item{display:flex;align-items:center}.step-item.grow{flex:1}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .3s}
.step-dot.active{background:var(--ink);color:#fff}.step-dot.inactive{background:var(--border);color:var(--ink3)}
.step-label{margin-left:7px;font-size:12px;white-space:nowrap}.step-label.active{font-weight:700;color:var(--ink)}.step-label.inactive{font-weight:400;color:var(--ink3)}
.step-line{flex:1;height:2px;margin:0 10px}.step-line.active{background:var(--ink)}.step-line.inactive{background:var(--border)}
.label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;letter-spacing:.3px}
.input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;color:var(--ink);background:var(--card);transition:border .2s}
.input:focus{border-color:var(--accent)}.input::placeholder{color:#B0BEC5}textarea.input{min-height:80px;resize:vertical}
.chip{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;display:inline-block;border:1.5px solid var(--border);background:#F8FAFC;color:#334155}
.chip:hover{border-color:#CBD5E1;background:#F1F5F9}.chip.selected{background:var(--ink);color:#fff;border-color:var(--ink)}.chip.accent{background:#1E40AF;color:#fff;border-color:#1E40AF}
.btn{width:100%;border-radius:12px;font-weight:700;transition:all .2s;text-align:center}
.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:#1E293B}.btn-primary:disabled{opacity:.4;cursor:not-allowed}.btn-secondary{background:#F1F5F9;color:var(--ink2)}
.btn-big{padding:18px 0;font-size:18px;border-radius:16px;letter-spacing:.5px}
.btn-mid{padding:14px 0;font-size:15px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);transition:all .2s;cursor:pointer}
.card:hover{border-color:#CBD5E1}.card.expanded{box-shadow:0 4px 24px rgba(0,0,0,.06)}
.toggle-group{display:flex;gap:2px;background:#F1F5F9;border-radius:8px;padding:2px}
.toggle-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;background:transparent;color:var(--ink3);transition:all .2s}
.toggle-btn.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.hira-strip{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px;margin-bottom:16px;font-size:12px;color:#92400E}
.hira-detail{margin-top:12px;background:#fff;border-radius:var(--radius-sm);padding:14px;border:1px solid #E2E8F0}
.mini-stat{padding:8px 10px;border-radius:8px;background:#F8FAFC;border:1px solid #F1F5F9}
.mini-stat .lbl{font-size:9px;color:var(--ink3);margin-bottom:1px}.mini-stat .val{font-size:14px;font-weight:800}
.purpose-card{padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);text-align:left;transition:all .2s}
.purpose-card.selected{border-color:var(--ink);background:#F8FAFC}.purpose-card:hover{border-color:#CBD5E1}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
.progress-bar{width:100%;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ink),var(--accent2));border-radius:3px;transition:width .4s ease}
.doc-gradient{border-radius:14px;padding:18px;color:#fff;margin-bottom:18px}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.check-circle{width:68px;height:68px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) .3s both}
.info-box{border-radius:var(--radius-sm);padding:12px 14px;font-size:12px;text-align:left}
.info-box.green{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
.info-box.yellow{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.info-box.blue{background:#F0F9FF;border:1px solid #BAE6FD;color:#0369A1}
.sort-tabs{display:flex;gap:3px;margin-bottom:16px;background:#F1F5F9;border-radius:var(--radius-sm);padding:3px}
.sort-tab{flex:1;padding:9px 0;border-radius:8px;font-size:12px;font-weight:500;background:transparent;color:var(--ink2);transition:all .2s;text-align:center}
.sort-tab.active{background:#fff;color:var(--ink);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.stat-box{padding:10px 12px;border-radius:9px;background:#F8FAFC;border:1px solid #F1F5F9}.stat-box.hl{background:#EFF6FF;border-color:#BFDBFE}
.grp-btn{display:flex;align-items:center;gap:6;width:100%;padding:9px 12px;border-radius:9px;background:#F8FAFC;border:1px solid #E2E8F0;cursor:pointer;transition:all .2s;text-align:left;margin-bottom:4px}
.grp-btn:hover{background:#F1F5F9}.grp-btn.open{background:#EFF6FF;border-color:#BFDBFE}
@media(min-width:768px){.container{max-width:760px;padding:36px 32px 80px}.header{padding:22px 32px}.header-title{font-size:24px}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.card{padding:18px}}
@media(min-width:1024px){.container{max-width:860px;padding:40px 40px 80px}.header-inner{max-width:860px}.step-dot{width:40px;height:40px;font-size:14px}.step-label{font-size:13px}}
@media(max-width:480px){.container{padding:18px 14px 60px}.header{padding:14px 16px}.header-title{font-size:17px}.chip{padding:5px 10px;font-size:12px}.step-dot{width:30px;height:30px;font-size:11px}.step-label{font-size:10px;margin-left:4px}.sort-tab{font-size:11px;padding:8px 0}.btn-big{padding:16px 0;font-size:16px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const H=[
{id:"snuh",name:"서울대학교병원",short:"서울대병원",color:"#1B3A5C",accent:"#3B7DD8"},
{id:"amc",name:"서울아산병원",short:"아산병원",color:"#0D4E2C",accent:"#2EA85A"},
{id:"smc",name:"삼성서울병원",short:"삼성병원",color:"#1A237E",accent:"#5C6BC0"},
{id:"sev",name:"세브란스병원",short:"세브란스",color:"#0D47A1",accent:"#42A5F5"},
{id:"snubh",name:"분당서울대병원",short:"분당서울대",color:"#4A148C",accent:"#AB47BC"},
];

const SP_GROUPS={
"내과계":{
  "소화기내과":["위암","대장암","간암","췌장암","GERD","IBD","간경변","식도질환","담석"],
  "호흡기내과":["폐암","천식","COPD","폐섬유증","기관지확장증","폐렴","흉막질환"],
  "순환기내과":["관상동맥질환","심부전","부정맥","판막질환","대동맥질환","고혈압","심근병증"],
  "내분비내과":["당뇨병","갑상선질환","골다공증","부신질환","뇌하수체종양","대사증후군"],
  "신장내과":["만성신부전","사구체신염","투석","신장이식","다낭신","전해질이상"],
  "혈액종양내과":["백혈병","림프종","다발성골수종","빈혈","MDS","항암치료"],
  "류마티스내과":["류마티스관절염","루프스","강직성척추염","통풍","베체트병","혈관염"],
  "감염내과":["패혈증","결핵","HIV","간염","원인불명열","여행의학"],
  "알레르기내과":["알레르기비염","두드러기","아나필락시스","약물알레르기","면역결핍"],
},
"외과계":{
  "일반외과":["위암수술","대장암수술","간암수술","담낭절제","탈장","충수염","복강경수술"],
  "외과(유방)":["유방암","유방양성종양","유방재건","유방축소"],
  "외과(갑상선)":["갑상선암","갑상선결절","부갑상선질환"],
  "흉부외과":["폐암수술","식도암수술","CABG","판막수술","대동맥수술","기흉"],
  "심장혈관외과":["관상동맥우회술","대동맥수술","말초혈관","정맥류","혈관기형"],
  "신경외과":["뇌종양","뇌동맥류","척추질환","디스크","척수종양","삼차신경통","뇌전증수술"],
  "정형외과":["인공관절","골절","인대손상","척추측만증","회전근개","스포츠손상","골종양"],
  "비뇨의학과":["전립선암","방광암","신장암","전립선비대증","요로결석","요실금","남성불임"],
  "산부인과":["자궁근종","난소암","자궁경부암","자궁내막증","골반장기탈출","불임","고위험임신"],
  "성형외과":["안면윤곽","코성형","눈성형","유방재건","화상재건","미세수술","안면마비재건"],
  "이식외과":["간이식","신장이식","췌장이식","다장기이식"],
},
"감각기·두경부":{
  "이비인후과":["비중격만곡","부비동염","편도질환","중이염","난청","두경부암","음성장애","수면무호흡"],
  "안과":["백내장","녹내장","망막질환","황반변성","당뇨망막병증","사시","라식/라섹","안성형"],
  "피부과":["아토피","건선","피부암","여드름","탈모","대상포진","색소질환"],
  "치과(구강외과)":["사랑니발치","구강암","턱관절","임플란트","악안면기형","구강점막질환"],
},
"신경·정신·재활":{
  "신경과":["뇌졸중","간질","파킨슨병","치매","다발성경화증","두통","말초신경병","근무력증"],
  "정신건강의학과":["우울증","불안장애","조현병","ADHD","수면장애","중독","PTSD","양극성장애"],
  "재활의학과":["뇌졸중재활","척수손상재활","근골격재활","소아재활","심장재활","로봇재활"],
},
"영상·방사선":{
  "영상의학과":["중재시술","혈관색전술","경피적배액술","RFA","TACE","스텐트삽입"],
  "방사선종양학과":["방사선치료","양성자치료","감마나이프","SBRT","세기조절방사선"],
  "핵의학과":["PET-CT","갑상선치료","방사성동위원소","테라노스틱스"],
},
"소아·가정·기타":{
  "소아청소년과":["소아감염","소아혈액종양","소아심장","소아신경","소아내분비","소아알레르기","신생아"],
  "소아외과":["소아종양","선천성기형","소아비뇨","소아정형"],
  "가정의학과":["건강검진","비만","금연","노인건강","만성질환관리"],
  "응급의학과":["외상","중독","심정지","화상","다발성손상"],
  "직업환경의학과":["직업성질환","유해물질노출","건강검진(산업)"],
  "마취통증의학과":["만성통증","신경차단","수술전평가","암성통증","두통"],
},
};
const SP={};Object.values(SP_GROUPS).forEach(g=>Object.assign(SP,g));

const PU=[
{id:"diagnosis",label:"진단",icon:"🔍",desc:"초진 검사 및 진단"},
{id:"second_opinion",label:"2차 소견",icon:"📋",desc:"기존 진단에 대한 재검토"},
{id:"surgery",label:"수술",icon:"🏥",desc:"수술 상담 및 예약"},
{id:"complication",label:"합병증 치료",icon:"⚕️",desc:"치료 후 합병증 관리"},
];

/* 더미 의사·HIRA 생성기(genDocs/mkHira)는 제거됨 —
   실제 백엔드 데이터만 표시하며, 로딩 중에는 더미 대신 진행 상태를 보여준다. */

function nxtD(d){const dt=new Date();dt.setDate(dt.getDate()+d);while(dt.getDay()===0||dt.getDay()===6)dt.setDate(dt.getDate()+1);return dt.toISOString().split("T")[0];}
function fD(s){const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()}(${"일월화수목금토"[d.getDay()]})`;}
const gh=id=>H.find(h=>h.id===id);

function Steps({current,steps}){return(
<div className="steps">{steps.map((s,i)=>(
<React.Fragment key={i}>
<div className="step-item"><div className={`step-dot ${i<=current?'active':'inactive'}`}>{i<current?'✓':i+1}</div>
<span className={`step-label ${i===current?'active':'inactive'}`}>{s}</span></div>
{i<steps.length-1&&<div className="step-item grow"><div className={`step-line ${i<current?'active':'inactive'}`}/></div>}
</React.Fragment>))}</div>);}

/* ─── S1: Patient Input ─── */
function S1({data:d,onChange:oc,onNext}){
const[dept,setDept]=useState(d.department||"");
const[mode,setMode]=useState(d.diseaseMode||"chip");
const[ft,setFt]=useState(d.freeTextDisease||"");
const[openGrp,setOpenGrp]=useState(null);
const ok=d.age&&d.gender&&(mode==="chip"?(d.department&&d.disease):ft.trim().length>1)&&d.purpose;

return(<div>
<h2 style={{fontSize:22,fontWeight:800,marginBottom:4}}>환자 정보 입력</h2>
<p style={{color:'var(--ink3)',fontSize:14,marginBottom:28}}>진료 대상 환자의 기본 정보를 입력해주세요.</p>

<div className="two-col" style={{marginBottom:20}}>
<div><label className="label">나이</label><input className="input" type="number" placeholder="예: 55" value={d.age||""} onChange={e=>oc({...d,age:e.target.value})}/></div>
<div><label className="label">성별</label><div style={{display:'flex',gap:8}}>
{["남성","여성"].map(g=><button key={g} className={`chip ${d.gender===g?'selected':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>oc({...d,gender:g})}>{g}</button>)}
</div></div>
</div>

<div style={{marginBottom:20}}>
<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
<label className="label" style={{margin:0}}>질환 입력</label>
<div className="toggle-group">
{[{k:"chip",l:"진료과 선택"},{k:"text",l:"직접 입력"}].map(m=>(
<button key={m.k} className={`toggle-btn ${mode===m.k?'active':''}`}
onClick={()=>{setMode(m.k);if(m.k==="text")oc({...d,disease:ft,diseaseMode:"text"});else oc({...d,disease:d.chipDisease||"",diseaseMode:"chip"});}}>{m.l}</button>
))}
</div>
</div>

{mode==="chip"?(<>
<div style={{marginBottom:12}}>
<div style={{fontSize:11,color:'var(--ink3)',marginBottom:8}}>진료과 <span style={{color:'#CBD5E1'}}>— 카테고리를 눌러 펼치세요</span></div>
{Object.entries(SP_GROUPS).map(([grp,deptMap])=>{
const grpDepts=Object.keys(deptMap);
const hasSelected=grpDepts.includes(dept);
const isOpen=openGrp===grp||hasSelected;
return(<div key={grp} style={{marginBottom:4}}>
<button className={`grp-btn ${isOpen?'open':''}`}
onClick={()=>setOpenGrp(isOpen&&!hasSelected?null:grp)}>
<span style={{fontSize:13,fontWeight:700,color:hasSelected?'#1D4ED8':'var(--ink)',flex:1}}>{grp}</span>
<span style={{fontSize:10,color:'var(--ink3)'}}>{grpDepts.length}개과</span>

/* ─── S2: Loading ─── */
function S2({onDone,ready}){
const[p,setP]=useState(0);const[st,setSt]=useState("");
const[waiting,setWaiting]=useState(false);
const stages=["서울대병원 대기정보 조회 중...","서울아산병원 예약현황 수집 중...","삼성서울병원 의료진 수집 중...","세브란스병원 연동 중...","분당서울대병원 조회 중...","심평원(HIRA) 수술건수·사망률 조회 중...","건보공단(NHIS) 진료통계 연동 중...","PubMed / KCI H-index 산출 중...","네이버뉴스 언론노출 집계 중..."];
// 실제 데이터가 도착했는지를 ref로 추적 (인터벌 안에서 최신값 참조)
const readyRef=useRef(ready);
useEffect(()=>{readyRef.current=ready;},[ready]);
useEffect(()=>{let i=0;const iv=setInterval(()=>{
  if(i<stages.length){
    // 애니메이션 단계 진행 — 단, 실데이터 대기를 위해 95%에서 멈춤
    i++;setP(Math.min(i/stages.length*95,95));setSt(stages[Math.min(i-1,stages.length-1)]);
  } else if(readyRef.current){
    // 단계 완료 + 실데이터 도착 → 100% 후 결과로
    setP(100);setSt("분석 완료!");setWaiting(false);
    clearInterval(iv);setTimeout(onDone,400);
  } else {
    // 단계는 끝났지만 실데이터 미도착 → 로딩 유지
    setP(95);setWaiting(true);setSt("실제 의료진 데이터 수집 중...");
  }
},550);return()=>clearInterval(iv);},[]);
return(<div style={{textAlign:'center',padding:'60px 20px'}}>
<div className="spinner"/><div style={{fontSize:15,fontWeight:600,marginBottom:16}}>{st}</div>
<div className="progress-bar"><div className="progress-fill" style={{width:`${p}%`}}/></div>
<div style={{fontSize:12,color:'var(--ink3)',marginTop:8}}>{waiting?"5개 병원 실시간 크롤링·논문지표 조회 중 (최대 40초 소요)":`${Math.round(p)}%`}</div>
</div>);}

<React.Fragment key={i}><div style={{color:'var(--ink3)',fontWeight:600}}>{k}</div><div style={{fontWeight:600}}>{v}</div></React.Fragment>
)}
</div></div>
<div className="info-box yellow" style={{marginBottom:24}}>💡 <b>안내:</b> 병원에서 확인 연락이 올 수 있습니다. 건강보험증 및 진료기록을 준비해주세요.</div>
{rv.redirectUrl && (
  <a href={rv.redirectUrl} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none', display:'block', marginBottom:12}}>
    <button className="btn btn-primary btn-big" style={{background:h.color, boxShadow:'0 6px 20px rgba(0,0,0,.15)'}}>
      🔗 병원 공식 사이트에서 예약 완료하기 (본인인증)
    </button>
  </a>
)}
<button className={`btn ${rv.redirectUrl ? 'btn-secondary' : 'btn-primary'} btn-big`} onClick={onReset}>새로운 예약 →</button>
</div>);}

/* ─── App ─── */
function App(){
const[step,setStep]=useState(0);
const[pd,setPd]=useState({});
const[doc,setDoc]=useState(null);
const[res,setRes]=useState(null);
const[doctors,setDoctors]=useState([]);
const[backendOffline,setBackendOffline]=useState(false);
const[searchDone,setSearchDone]=useState(false);
const steps=["환자정보","검색","결과확인","예약","완료"];

const startSearch = async () => {
  setStep(1);
  setDoctors([]);
  setBackendOffline(false);
  setSearchDone(false);

  const searchParams = {
    disease: pd.disease || "",
    department: pd.department || "",
    purpose: pd.purpose || "",
    age: parseInt(pd.age) || 0,
    gender: pd.gender || ""
  };
  
  try {
    const response = await fetch('http://127.0.0.1:8000/api/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(searchParams)
    });
    
    if (!response.ok) {
      throw new Error(`Server returned status ${response.status}`);
    }
    
    const data = await response.json();
    if (data && data.doctors) {
      const mapped = data.doctors.map(doc => ({
        id: doc.id,
        name: doc.name,
        position: doc.position,
        hospitalId: doc.hospital_id,
        specialty: doc.department,
        hIndex: doc.h_index,
        waitDays: doc.wait_days,
        newsCount: doc.news_count,
        papers: doc.papers,
        citations: doc.citations,
        docSurgeries: doc.doc_surgeries,
        hiraData: doc.hira_data,
        slots: doc.available_slots.map(s => ({ date: s.date, time: s.time }))
      }));
      setDoctors(mapped);
    } else {
      throw new Error("No doctors in search response");
    }
  } catch (err) {
    console.warn("Backend server is offline or failed. Falling back to in-browser simulation.", err);
    setBackendOffline(true);
  } finally {
    setSearchDone(true);
  }
};

const confirmReservation = async (reservationData) => {
  const localReservation = {
    ...reservationData,
    doctor: reservationData.doctor,
    slot: reservationData.slot,
    patientName: reservationData.patientName,
    phone: reservationData.phone,
    notes: reservationData.notes,
    address: reservationData.address
  };
  setRes(localReservation);
  setStep(4);
  
  try {
    const reserveParams = {
      doctor_id: reservationData.doctor.id,
      hospital_id: reservationData.doctor.hospitalId,
      slot_date: reservationData.slot.date,
      slot_time: reservationData.slot.time,
      patient_name: reservationData.patientName,
      phone: reservationData.phone,
      ssn: reservationData.ssn || null,
      address: reservationData.address || null,
      notes: reservationData.notes || null
    };
    
    const response = await fetch('http://127.0.0.1:8000/api/reserve', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(reserveParams)
    });
    
    if (response.ok) {
      const data = await response.json();
      if (data && data.success && data.redirect_url) {
        setRes(prev => ({
          ...prev,
          redirectUrl: data.redirect_url
        }));
      }
    }
  } catch (err) {
    console.warn("Backend reserve call failed, utilizing local fallback.", err);
  }
};

return(<div>
<div className="header"><div className="header-inner">
<div className="header-tag">BIG 5 HOSPITAL AGENT</div>
<div className="header-title">빅5 병원 통합 예약 에이전트</div>
<div className="header-sub">서울대 · 아산 · 삼성 · 세브란스 · 분당서울대 ┃ 심평원·건보공단 연동</div>
</div></div>
<div className="container">
<Steps current={step>1?step-1:step} steps={steps}/>
{step===0&&<S1 data={pd} onChange={setPd} onNext={startSearch}/>}
{step===1&&<S2 onDone={()=>setStep(2)} ready={searchDone}/>}
{step===2&&<S3 patientData={pd} doctors={doctors} onSelect={d=>{setDoc(d);setStep(3);}}/>}
{step===3&&doc&&<S4 doctor={doc} patientData={pd} onBack={()=>setStep(2)} onConfirm={confirmReservation}/>}
{step===4&&res&&<S5 reservation={res} onReset={()=>{setStep(0);setPd({});setDoc(null);setRes(null);setDoctors([]);}}/>}
</div>
</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
